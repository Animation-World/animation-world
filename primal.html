<!DOCTYPE html>
<html>
<head>
<title>Primal Series Guide | Animation World</title>

<style>
/* HERO SECTION */

.primal-hero{
height:80vh;
background:url("images/primal-banner.jpg") center/cover no-repeat;
display:flex;
align-items:center;
padding-left:80px;
color:white;
}

.hero-content h1{
font-size:70px;
letter-spacing:4px;
}

.hero-content p{
font-size:18px;
margin-top:10px;
max-width:500px;
}


/* SEASON TABS */

.season-tabs{
display:flex;
justify-content:center;
margin-top:40px;
gap:15px;
}

.tab{
padding:10px 25px;
background:#111;
border:none;
color:white;
cursor:pointer;
font-size:16px;
border-radius:5px;
transition:0.3s;
}

.tab:hover{
background:#ff3c00;
}

.tab.active{
background:#ff3c00;
}


/* EPISODE GRID */

.episode-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}


/* EPISODE CARD */

.episode-card{
background:#111;
border-radius:10px;
overflow:hidden;
transition:0.4s;
cursor:pointer;
}

.episode-card img{
width:100%;
height:150px;
object-fit:cover;
}

.episode-card h3{
color:white;
padding:10px 15px 0;
}

.episode-card p{
color:#bbb;
padding:0 15px 15px;
}

.episode-card:hover{
transform:scale(1.08);
box-shadow:0 10px 25px rgba(0,0,0,0.7);
}


/* SEASON VISIBILITY */

.season-content{
display:none;
}

.season-content.active{
display:block;
}
</style>
</head>

<body>

<section class="primal-hero">
    <div class="hero-content">
        <h1>PRIMAL</h1>
        <p>An adult animated prehistoric adventure by Genndy Tartakovsky.</p>
    </div>
</section>

<section class="season-section">

<div class="season-tabs">
<button class="tab active" onclick="showSeason('s1')">Season 1</button>
<button class="tab" onclick="showSeason('s2')">Season 2</button>
<button class="tab" onclick="showSeason('s3')">Season 3</button>
</div>

<!-- Season 1 -->
<div id="s1" class="season-content active">

<div class="episode-grid">

<div class="episode-card">
<img src="images/ep1.jpg">
<h3>Episode 1</h3>
<p>Spear and Fang</p>
</div>

<div class="episode-card">
<img src="images/ep2.jpg">
<h3>Episode 2</h3>
<p>River of Snakes</p>
</div>

<div class="episode-card">
<img src="images/ep3.jpg">
<h3>Episode 3</h3>
<p>A Cold Death</p>
</div>

</div>
</div>

<!-- Season 2 -->
<div id="s2" class="season-content">

<div class="episode-grid">

<div class="episode-card">
<img src="images/ep1s2.jpg">
<h3>Episode 1</h3>
<p>Sea of Despair</p>
</div>

</div>
</div>

<!-- Season 3 -->
<div id="s3" class="season-content">
<p style="color:white">Coming Soon</p>
</div>

</section>

</div>
<script>
 function showSeason(season){

document.querySelectorAll(".season-content")
.forEach(sec=>sec.classList.remove("active"));

document.getElementById(season)
.classList.add("active");

document.querySelectorAll(".tab")
.forEach(tab=>tab.classList.remove("active"));

event.target.classList.add("active");

}
</script>

</body>
</html>
