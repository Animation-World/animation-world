<!DOCTYPE html>
<html>
<head>
<title>Primal Series Guide | Animation World</title>

<style>
/* HERO SECTION */

.primal-container{
padding:80px 60px;
background:#020617;
min-height:100vh;
}


/* TITLE */

.primal-title{
color:white;
font-size:42px;
letter-spacing:3px;
margin-bottom:40px;
}


/* SEASON BUTTONS */

.season-switch{
margin-bottom:30px;
}

.season-btn{
background:#0f172a;
border:none;
color:#94a3b8;
padding:10px 20px;
margin-right:10px;
cursor:pointer;
border-radius:6px;
transition:.3s;
}

.season-btn:hover{
background:#1e293b;
color:white;
}

.season-btn.active{
background:#38bdf8;
color:black;
}


/* EPISODE ROW */

.episode-row{
display:flex;
gap:20px;
overflow-x:auto;
padding-bottom:10px;
}


/* EPISODE CARD */

.episode{
min-width:220px;
background:#0f172a;
border-radius:10px;
overflow:hidden;
transition:.3s;
cursor:pointer;
}

.episode img{
width:100%;
height:140px;
object-fit:cover;
}

.episode span{
display:block;
padding:10px;
color:white;
font-size:14px;
}

.episode:hover{
transform:scale(1.1);
box-shadow:0 10px 25px rgba(0,0,0,.7);
}


/* SEASON SWITCH */

.season{
display:none;
}

.season.active{
display:block;
}
</style>
</head>

<body>

<section class="primal-container">

<h1 class="primal-title">PRIMAL</h1>

<div class="season-switch">
<button onclick="showSeason('season1')" class="season-btn active">Season 1</button>
<button onclick="showSeason('season2')" class="season-btn">Season 2</button>
<button onclick="showSeason('season3')" class="season-btn">Season 3</button>
</div>


<!-- SEASON 1 -->

<div id="season1" class="season active">

<div class="episode-row">

<div class="episode">
<img src="images/ep1.jpg">
<span>Episode 1</span>
</div>

<div class="episode">
<img src="images/ep2.jpg">
<span>Episode 2</span>
</div>

<div class="episode">
<img src="images/ep3.jpg">
<span>Episode 3</span>
</div>

<div class="episode">
<img src="images/ep4.jpg">
<span>Episode 4</span>
</div>

</div>

</div>


<!-- SEASON 2 -->

<div id="season2" class="season">

<div class="episode-row">

<div class="episode">
<img src="images/s2ep1.jpg">
<span>Episode 1</span>
</div>

</div>

</div>

</section>
<script>
 function showSeason(id){

document.querySelectorAll(".season")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");


document.querySelectorAll(".season-btn")
.forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");

}
</script>

</body>
</html>
