<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Genndy Tartakovsky's Primal | Animation World</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
overflow:hidden;
}

/* MAIN */

.primal-container{
height:100vh;
padding:70px 60px;
box-sizing:border-box;
display:flex;
flex-direction:column;
max-width:1500px;
margin:auto;
}

/* SERIES HEADER */

.series-header{
margin-bottom:25px;
}

.series-title{
font-size:42px;
margin-bottom:6px;
}

.series-meta{
display:flex;
gap:15px;
color:#94a3b8;
font-size:14px;
align-items:center;
}

.imdb{
background:#facc15;
color:black;
padding:4px 10px;
border-radius:6px;
font-weight:600;
}

/* SEASON SWITCH */

.season-switch{
display:flex;
gap:10px;
margin:25px 0;
}

.season-btn{
background:#0f172a;
border:none;
color:#94a3b8;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-weight:500;
transition:.3s;
}

.season-btn:hover{
background:#1e293b;
color:white;
}

.season-btn.active{
background:#38bdf8;
color:black;
}

/* SEASONS */

.season{
display:none;
}

.season.active{
display:block;
}

/* EPISODE ROW */

.episode-row{
display:flex;
gap:18px;
overflow-x:auto;
padding-bottom:10px;
}

/* SCROLLBAR */

.episode-row::-webkit-scrollbar{
height:6px;
}

.episode-row::-webkit-scrollbar-thumb{
background:#38bdf8;
border-radius:6px;
}

/* CARD */

.episode{
min-width:230px;
background:#0f172a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
position:relative;
}

/* IMAGE */

.episode img{
width:100%;
height:140px;
object-fit:cover;
display:block;
}

/* INFO */

.episode-info{
padding:10px;
}

.episode-title{
font-size:14px;
margin-bottom:4px;
}

.runtime{
font-size:12px;
color:#94a3b8;
}

/* EP NUMBER */

.ep-number{
position:absolute;
top:8px;
left:8px;
background:rgba(0,0,0,.7);
padding:3px 7px;
font-size:11px;
border-radius:4px;
}

/* PLAY BUTTON */

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.7);
border-radius:50%;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
opacity:0;
transition:.3s;
}

/* HOVER */

.episode:hover{
transform:scale(1.08);
box-shadow:0 15px 35px rgba(0,0,0,.8);
}

.episode:hover .play-btn{
opacity:1;
}

</style>
</head>


<body>

<section class="primal-container">

<!-- HEADER -->

<div class="series-header">

<h1 class="series-title">
Genndy Tartakovsky's Primal
</h1>

<div class="series-meta">

<span>2019</span>
<span>Action</span>
<span>3 Seasons</span>

<span class="imdb">⭐ 8.7 IMDb</span>

</div>

</div>


<!-- SEASON SWITCH -->

<div class="season-switch">

<button class="season-btn active"
onclick="showSeason('s1',this)">Season 1</button>

<button class="season-btn"
onclick="showSeason('s2',this)">Season 2</button>

<button class="season-btn"
onclick="showSeason('s3',this)">Season 3</button>

</div>


<!-- SEASON 1 -->

<div id="s1" class="season active">

<div class="episode-row">

<div class="episode">
<span class="ep-number">EP1</span>
<img src="images/primal1.jpg">
<div class="play-btn">▶</div>

<div class="episode-info">
<div class="episode-title">Spear and Fang</div>
<div class="runtime">22 min</div>
</div>
</div>


<div class="episode">
<span class="ep-number">EP2</span>
<img src="images/primal2.jpg">
<div class="play-btn">▶</div>

<div class="episode-info">
<div class="episode-title">River of Snakes</div>
<div class="runtime">22 min</div>
</div>
</div>


<div class="episode">
<span class="ep-number">EP3</span>
<img src="images/primal3.jpg">
<div class="play-btn">▶</div>

<div class="episode-info">
<div class="episode-title">A Cold Death</div>
<div class="runtime">22 min</div>
</div>
</div>


<div class="episode">
<span class="ep-number">EP4</span>
<img src="images/primal4.jpg">
<div class="play-btn">▶</div>

<div class="episode-info">
<div class="episode-title">Terror Under the Blood Moon</div>
<div class="runtime">22 min</div>
</div>
</div>

</div>
</div>



<!-- SEASON 2 -->

<div id="s2" class="season">

<div class="episode-row">

<div class="episode">
<span class="ep-number">EP1</span>
<img src="images/s2-1.jpg">
<div class="play-btn">▶</div>

<div class="episode-info">
<div class="episode-title">Sea of Despair</div>
<div class="runtime">23 min</div>
</div>

</div>

</div>

</div>



<!-- SEASON 3 -->

<div id="s3" class="season">

<div class="episode-row">

<div class="episode">
<span class="ep-number">EP1</span>
<img src="images/primal-s3.jpg">
<div class="play-btn">▶</div>

<div class="episode-info">
<div class="episode-title">Coming Soon</div>
<div class="runtime">TBA</div>
</div>

</div>

</div>

</div>

</section>


<script>

function showSeason(id,btn){

document.querySelectorAll(".season")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

document.querySelectorAll(".season-btn")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

</script>

</body>
</html>
